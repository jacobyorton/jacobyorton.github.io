<!DOCTYPE html>
<head>
   <style>
       body { 
         background: black; 
         margin: 0;
       }

       .iframe-wrapper {
         position: relative;
         width: 100%;
         padding-top: 56.25%; /* 16:9 */
       }

       .my-iframe {
         position: absolute;
         top: 0;
         left: 0;
         width: 100%;
         height: 100%;
         border: 0;
       }
   </style>
</head>
<body>
    <div class="iframe-wrapper">
        <iframe 
          class="my-iframe" 
          src="https://streamspass.net/mlb/brewers.html" 
          allowfullscreen 
          allow="fullscreen">
        </iframe>
    </div>
</body>
