<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stream Hub</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: black;
  }

  video {
    width: 100%;
    height: 100%;
    background: black;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    color: white;
    text-align: center;
    gap: 12px;
  }

  button {
    padding: 12px 18px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    border-radius: 6px;
  }

  .primary {
    background: gold;
    color: black;
  }

  .secondary {
    background: #444;
    color: white;
  }

  a {
    color: cyan;
  }
</style>
</head>

<body>

<div id="container">

  <video id="video" controls autoplay></video>

  <div id="overlay">
    <div id="status">Loading stream...</div>

    <button class="primary" id="retryBtn">Retry Stream</button>

    <a class="secondary" href="https://mlbwebcast.com/stream/brewers.html" target="_blank" rel="noopener">
      Open Backup Stream
    </a>
  </div>

</div>

<script>
const STREAM_URL = "https://s2.thegamehd.top/auth/130.m3u8?token=REDACTED";

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const status = document.getElementById('status');
const retryBtn = document.getElementById('retryBtn');

let hls;

function showOverlay(msg) {
  status.textContent = msg;
  overlay.style.display = "flex";
}

function hideOverlay() {
  overlay.style.display = "none";
}

function loadStream() {
  showOverlay("Loading stream...");

  if (hls) {
    hls.destroy();
    hls = null;
  }

  // Safari native HLS
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = STREAM_URL;
    video.play().catch(() => {});
    hideOverlay();
    return;
  }

  // HLS.js for Chrome/Firefox
  if (Hls.isSupported()) {
    hls = new Hls();

    hls.loadSource(STREAM_URL);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
      hideOverlay();
    });

    hls.on(Hls.Events.ERROR, function (event, data) {
      console.error("HLS error:", data);

      showOverlay("Stream failed to load. Try backup link below.");
    });

  } else {
    showOverlay("HLS not supported in this browser.");
  }
}

retryBtn.addEventListener('click', loadStream);

loadStream();
</script>

</body>
</html>
