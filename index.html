<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    /* 16:9 responsive container */
    .iframe-wrapper {
      position: relative;
      width: 100%;
      max-width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .iframe-inner {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: calc(100vh * (16 / 9));
      max-height: calc(100vw * (9 / 16));
      aspect-ratio: 16 / 9;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      z-index: 1;
    }

    /* Click shield (prevents accidental ad clicks) */
    .click-blocker {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: pointer;
      background: transparent;
    }

    .click-blocker.hidden {
      display: none;
    }

    /* Optional overlay button */
    .play-overlay {
      position: absolute;
      z-index: 3;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 12px 20px;
      border-radius: 8px;
      font-family: sans-serif;
      cursor: pointer;
    }

    /* Nuclear blocking inside iframe */
    iframe #dontfold, iframe #dontfold *, iframe #lijitframe, iframe #ligitframe *, iframe #pxcelframe, iframe #pxcelframe *, iframe img, iframe a {
      z-index: 0 !important;
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }
  </style>
</head>

<body>

<div class="iframe-wrapper">
  <div class="iframe-inner">

    <iframe
      src="https://streamspass.net/mlb/brewers.html"
      allow="fullscreen"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-presentation">
    </iframe>

    <div class="click-blocker" id="blocker"></div>

    <div class="play-overlay" id="playBtn">Click to enable player</div>

  </div>
</div>

<script>
  const blocker = document.getElementById('blocker');
  const playBtn = document.getElementById('playBtn');

  playBtn.addEventListener('click', () => {
    blocker.classList.add('hidden');
    playBtn.style.display = 'none';
  });
</script>

</body>
</html>
